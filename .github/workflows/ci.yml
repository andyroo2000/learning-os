name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  PHP_VERSION: '8.5'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo_sqlite, sqlite3
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Validate Composer files
        run: composer validate --strict

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate --ansi

      - name: Install Node dependencies
        run: npm ci

      - name: Run PHP style check
        run: composer run lint

      - name: Run PHP tests
        run: composer run test

      - name: Build frontend assets
        run: npm run build

  postgres-migrations:
    name: PostgreSQL migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: learning_os_test
          # Ephemeral CI database; trust auth avoids hardcoded dummy passwords.
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: learning_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U learning_os -d learning_os_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: testing
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: learning_os_test
      DB_USERNAME: learning_os
      DB_PASSWORD: ''
      PGSQL_SSL_MODE: disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo_pgsql, pgsql
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Run PostgreSQL migrations
        run: php artisan migrate:fresh --force --ansi
