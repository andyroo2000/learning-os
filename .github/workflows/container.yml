name: Container

on:
  pull_request:
    paths:
      - '.github/workflows/container.yml'
      - '.dockerignore'
      - 'Dockerfile'
      - 'deploy/**'
      - 'app/**'
      - 'bootstrap/**'
      - 'config/**'
      - 'database/**'
      - 'public/**'
      - 'resources/**'
      - 'routes/**'
      - 'lang/**'
      - 'artisan'
      - 'composer.json'
      - 'composer.lock'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/container.yml'
      - '.dockerignore'
      - 'Dockerfile'
      - 'deploy/**'
      - 'app/**'
      - 'bootstrap/**'
      - 'config/**'
      - 'database/**'
      - 'public/**'
      - 'resources/**'
      - 'routes/**'
      - 'lang/**'
      - 'artisan'
      - 'composer.json'
      - 'composer.lock'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/learning-os
  TEST_IMAGE: learning-os:container-test

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.TEST_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export runtime image
        run: docker save $TEST_IMAGE | gzip -1 > learning-os-image.tar.gz

      - name: Upload runtime image
        uses: actions/upload-artifact@v4
        with:
          name: learning-os-runtime-image
          path: learning-os-image.tar.gz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  test:
    name: Container smoke test
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Download runtime image
        uses: actions/download-artifact@v4
        with:
          name: learning-os-runtime-image

      - name: Load runtime image
        run: gunzip --stdout learning-os-image.tar.gz | docker load

      - name: Start PostgreSQL
        run: |
          docker network create learning-os-test
          docker run --detach --rm \
            --name learning-os-postgres \
            --network learning-os-test \
            --env POSTGRES_DB=learning_os \
            --env POSTGRES_USER=learning_os \
            --env POSTGRES_PASSWORD=container-test-password \
            --health-cmd='pg_isready -U learning_os -d learning_os' \
            --health-interval=2s \
            --health-timeout=3s \
            --health-retries=20 \
            postgres:16-alpine

          for attempt in {1..30}; do
            if [ "$(docker inspect --format='{{.State.Health.Status}}' learning-os-postgres)" = healthy ]; then
              exit 0
            fi
            sleep 2
          done

          docker logs learning-os-postgres
          exit 1

      - name: Generate ephemeral application key
        run: echo "TEST_APP_KEY=base64:$(openssl rand -base64 32)" >> "$GITHUB_ENV"

      - name: Migrate database
        run: |
          docker run --rm \
            --network learning-os-test \
            --env APP_KEY="$TEST_APP_KEY" \
            --env DB_CONNECTION=pgsql \
            --env DB_HOST=learning-os-postgres \
            --env DB_PORT=5432 \
            --env DB_DATABASE=learning_os \
            --env DB_USERNAME=learning_os \
            --env DB_PASSWORD=container-test-password \
            --env PGSQL_SSL_MODE=disable \
            $TEST_IMAGE php artisan migrate --force

      - name: Create authenticated smoke user
        run: |
          SMOKE_TOKEN=$(docker run --rm \
            --network learning-os-test \
            --env APP_KEY="$TEST_APP_KEY" \
            --env DB_CONNECTION=pgsql \
            --env DB_HOST=learning-os-postgres \
            --env DB_PORT=5432 \
            --env DB_DATABASE=learning_os \
            --env DB_USERNAME=learning_os \
            --env DB_PASSWORD=container-test-password \
            --env PGSQL_SSL_MODE=disable \
            $TEST_IMAGE php artisan tinker --execute='
              $user = App\Models\User::query()->create([
                  "name" => "Container Smoke",
                  "email" => "container-smoke@example.com",
                  "password" => Illuminate\Support\Facades\Hash::make(Illuminate\Support\Str::random(32)),
              ]);
              echo $user->createToken("container-smoke")->plainTextToken;
            ')

          test -n "$SMOKE_TOKEN"
          echo "::add-mask::$SMOKE_TOKEN"
          echo "SMOKE_TOKEN=$SMOKE_TOKEN" >> "$GITHUB_ENV"

      - name: Start Learning OS
        run: |
          docker run --detach --rm \
            --name learning-os-api \
            --network learning-os-test \
            --publish 127.0.0.1:8080:8080 \
            --env APP_KEY="$TEST_APP_KEY" \
            --env DB_CONNECTION=pgsql \
            --env DB_HOST=learning-os-postgres \
            --env DB_PORT=5432 \
            --env DB_DATABASE=learning_os \
            --env DB_USERNAME=learning_os \
            --env DB_PASSWORD=container-test-password \
            --env PGSQL_SSL_MODE=disable \
            --env CACHE_STORE=database \
            --env QUEUE_CONNECTION=sync \
            --env SESSION_DRIVER=database \
            $TEST_IMAGE

          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8080/up > /dev/null; then
              curl --fail --silent --show-error --location http://127.0.0.1:8080/ > /dev/null
              curl --fail --silent --show-error \
                --header "Accept: application/json" \
                --header "Authorization: Bearer $SMOKE_TOKEN" \
                http://127.0.0.1:8080/api/me \
                | jq --exit-status '.data.email == "container-smoke@example.com"' > /dev/null
              exit $?
            fi
            sleep 2
          done

          docker logs learning-os-api
          exit 1

      - name: Show container logs on failure
        if: failure()
        run: |
          docker logs learning-os-api 2>/dev/null || true
          docker logs learning-os-postgres 2>/dev/null || true

  publish:
    name: Publish image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - build
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download tested runtime image
        uses: actions/download-artifact@v4
        with:
          name: learning-os-runtime-image

      - name: Load tested runtime image
        run: gunzip --stdout learning-os-image.tar.gz | docker load

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=main-,format=long

      - name: Publish tested runtime image
        run: |
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              docker tag "$TEST_IMAGE" "$tag"
              docker push "$tag"
            fi
          done <<'TAGS'
          ${{ steps.metadata.outputs.tags }}
          TAGS
